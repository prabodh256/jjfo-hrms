services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-jjfo-docker-dev-secret-min-32-chars!!}
      PORT: 4000
      NODE_ENV: production
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
      DATABASE_URL: file:./data/prod.db
    volumes:
      - hrms-data:/app/prisma/data
      - hrms-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://api:4000
    volumes:
      - ./frontend:/app
      - web-modules:/app/node_modules
    depends_on:
      - api

volumes:
  hrms-data:
  hrms-uploads:
  web-modules:
